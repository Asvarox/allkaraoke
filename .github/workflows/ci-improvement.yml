name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 200 # needed to detect changed snapshots
      - name: Setup Node
        uses: './.github/templates/setup-node'
      - name: Run Chromatic
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
  quick-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: './.github/templates/setup-node'
      - parallel:
          - name: Format check
            run: pnpm format-check
          - name: Lint
            run: pnpm lint
          - name: Type check
            run: pnpm type-check
          - name: Test
            run: pnpm test
          - name: Build Storybook
            run: pnpm build-storybook
          - name: Knip
            run: pnpm knip
  e2e-tests-run:
    strategy:
      fail-fast: false
      matrix:
        # browser: [ 'chromium', 'firefox' ]
        browser: ['chromium']
        shardIndex: [1, 2, 3]
        shardTotal: [3]
    runs-on: ubuntu-latest
    env:
      VITE_APP_SENTRY_DSN_URL: ${{ secrets.VITE_APP_SENTRY_DSN_URL }}
      VITE_APP_POSTHOG_KEY: ${{ secrets.VITE_APP_POSTHOG_KEY }}
    container:
      image: docker://mcr.microsoft.com/playwright:v1.61.0-jammy
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: './.github/templates/setup-node'
      - name: Build app
        run: pnpm build
      - name: Configure local worker secrets for E2E
        run: cp .dev.vars.example .dev.vars
      - name: Run E2E tests
        uses: './.github/templates/run-playwright'
        with:
          project: '${{ matrix.browser }}'
          config: 'playwright.config.ts'
          shard: '${{ matrix.shardIndex }}'
          shardTotal: '${{ matrix.shardTotal }}'
          grepInvert: '@visual'
  e2e-tests-add-summary:
    runs-on: ubuntu-latest
    if: ${{ failure() }}
    needs: e2e-tests-run
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            core.summary.addRaw(`
            # E2E tests reports
            | Name          | Result |
            | ----------------------- | - |
            | **URL**: | 	https://${{ github.run_id }}.allkaraoke-party-tests-results.pages.dev |
            `
            ).write();

  ct-tests-run:
    container:
      image: docker://mcr.microsoft.com/playwright:v1.61.0-jammy
    permissions:
      contents: write # https://github.com/stefanzweifel/git-auto-commit-action?tab=readme-ov-file#usage
      pull-requests: write # allows commenting on a PR
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: './.github/templates/setup-node'
      - name: Run Component Tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: './.github/templates/run-playwright'
        with:
          config: 'playwright-ct.config.mts'
      - name: Run Component Tests and update snapshots
        if: github.ref != 'refs/heads/master'
        uses: './.github/templates/run-playwright'
        with:
          config: 'playwright-ct.config.mts'
          updateSnapshots: 'true'
          snapshotDir: '__snapshots__' # per playwright-ct.config.mts's snapshotDir
          snapshotSuffix: '-ci.png' # per playwright-ct.config.mts's snapshotPathTemplate
      - name: Commit snapshots and comment with diff thumbnails
        if: github.ref != 'refs/heads/master'
        uses: './.github/templates/commit-and-comment-snapshots'
        with:
          commit-message: '[ci-skip][skip-release-notes] chore: update visual regression snapshots'
          comment-body: 'Changes detected in visual regression tests. Please review.'
          comment-link-text: 'View the run that committed the updated snapshots'
          cloudflare-branch-prefix: 'ct'
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  visual-regression-tests-run:
    if: github.ref != 'refs/heads/master'
    container:
      image: docker://mcr.microsoft.com/playwright:v1.61.0-jammy
    permissions:
      contents: write # https://github.com/stefanzweifel/git-auto-commit-action?tab=readme-ov-file#usage
      pull-requests: write # allows commenting on a PR
    runs-on: ubuntu-latest
    env:
      VITE_APP_SENTRY_DSN_URL: ${{ secrets.VITE_APP_SENTRY_DSN_URL }}
      VITE_APP_POSTHOG_KEY: ${{ secrets.VITE_APP_POSTHOG_KEY }}
    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          # Value already defaults to true, but `persist-credentials` is required to push new commits to the repository.
          persist-credentials: true
      - name: Setup Node
        uses: './.github/templates/setup-node'
      - name: Build app
        run: |
          git config --global --add safe.directory /__w/allkaraoke/allkaraoke
          pnpm build
      - name: Configure local worker secrets for E2E
        run: cp .dev.vars.example .dev.vars
      - name: Run visual regression tests and update snapshots
        uses: './.github/templates/run-playwright'
        with:
          config: 'playwright.config.ts'
          grep: '@visual'
          updateSnapshots: 'true'
          snapshotDir: 'tests' # per playwright.config.ts's testDir
          snapshotSuffix: '-linux.png' # this job always renders in the Linux Playwright container
      - name: Commit snapshots and comment with diff thumbnails
        uses: './.github/templates/commit-and-comment-snapshots'
        with:
          commit-message: '[ci-skip][skip-release-notes] chore: update visual regression screenshots'
          comment-body: 'Changes detected in visual regression screenshots. Please review.'
          comment-link-text: 'View the run that committed the updated screenshots'
          cloudflare-branch-prefix: 'vr'
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

  deploy:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: ['e2e-tests-run', 'ct-tests-run', 'quick-checks']
    environment:
      name: production
      url: https://allkaraoke.party/
    env:
      VITE_APP_SENTRY_DSN_URL: ${{ secrets.VITE_APP_SENTRY_DSN_URL }}
      VITE_APP_POSTHOG_KEY: ${{ secrets.VITE_APP_POSTHOG_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 200 # needed for Sentry and release-note commit range collection
      - name: Setup Node
        uses: './.github/templates/setup-node'
      - run: npx playwright install chromium
        timeout-minutes: 3
      - run: pnpm build
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build # The folder the action should deploy.
      - name: Upload to Cloudflare
        id: deploy-report
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy

      - name: Create Sentry release
        uses: getsentry/action-release@v1
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
        with:
          environment: production
          sourcemaps: './build'
      - name: Add Deployment PostHog Annotation
        uses: actions/github-script@v8
        env:
          POSTHOG_PAT_KEY: ${{ secrets.POSTHOG_PAT_KEY }}
        with:
          github-token: ${{ secrets.GH_PAT_REPOS_WORKFLOW }}
          script: |
            const { execFileSync } = require('node:child_process');

            const previousSuccessfulRun = (
              await github.paginate(github.rest.actions.listWorkflowRuns, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                workflow_id: 'ci-improvement.yml',
                branch: 'master',
                event: 'push',
                status: 'completed',
                per_page: 100,
              })
            ).find((run) => run.id !== context.runId && run.conclusion === 'success');

            const releaseNotesJson = execFileSync(
              'node',
              [
                'scripts/cicd/get-release-note-commits.mjs',
                ...(previousSuccessfulRun?.head_sha ? [previousSuccessfulRun.head_sha] : []),
                context.sha,
              ],
              { encoding: 'utf8' },
            );
            const { messages: includedSubjects } = JSON.parse(releaseNotesJson);

            if (includedSubjects.length === 0) {
              core.notice(
                `Skipping PostHog release annotation. No release-note commits found between ${previousSuccessfulRun?.head_sha ?? 'repository start'} and ${context.sha}.`,
              );
              return;
            }

            const deployUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const content = [`[Deployment](${deployUrl})`, ...includedSubjects.map((subject) => `- ${subject}`)].join('\n');
            const response = await fetch('https://eu.posthog.com/api/projects/281/annotations/', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${process.env.POSTHOG_PAT_KEY}`,
              },
              body: JSON.stringify({
                content,
                date_marker: new Date().toISOString(),
                scope: 'project',
                creation_type: 'GIT',
              }),
            });

            if (!response.ok) {
              throw new Error(`PostHog annotation failed with status ${response.status}: ${await response.text()}`);
            }

            core.info(
              `Annotated PostHog with ${includedSubjects.length} commit message(s) from ${previousSuccessfulRun?.head_sha ?? 'repository start'}..${context.sha}.`,
            );
      - name: 'Start monitoring'
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GH_PAT_REPOS_WORKFLOW }}
          script: |
            github.rest.actions.updateRepoVariable({
            owner: context.repo.owner,
            repo: context.repo.repo,
            name: 'MONITORING_ATTEMPTS',
            value: '4'
            });
              github.rest.actions.enableWorkflow({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'monitor-posthog-events.yml',
            });

  deploy-branch:
    runs-on: ubuntu-latest
    if: github.ref != 'refs/heads/master'
    environment:
      name: prs
      url: ${{ steps.deploy-report.outputs.deployment-url }}
    env:
      VITE_APP_SENTRY_DSN_URL: ${{ secrets.VITE_APP_SENTRY_DSN_URL }}
      VITE_APP_POSTHOG_KEY: ${{ secrets.VITE_APP_POSTHOG_KEY }}
    steps:
      - uses: actions/checkout@v5
      - name: Setup Node
        uses: './.github/templates/setup-node'
      - run: npx playwright install chromium
        timeout-minutes: 3
      - run: pnpm build
        shell: bash
      - name: Upload to Cloudflare
        id: deploy-report
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --name=allkaraoke-party-pr-${{ github.run_id }}
